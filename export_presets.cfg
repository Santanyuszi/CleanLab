; Godot 4 export presets
; Generated for CleanLab – Android / Google Play release.
;
; BEFORE BUILDING:
;   1. Set keystore/release, keystore/release_user, keystore/release_password
;      (use export_credentials.cfg which is gitignored, or Godot Editor export dialog).
;   2. Replace package/unique_name if your Play Console app uses a different ID.
;   3. Increment version/code by 1 with every upload to Play Console.
;   4. launcher_icons/* are intentionally blank until final Android launcher
;      and adaptive icon assets are added to the repository.

